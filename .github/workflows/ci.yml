name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

      - name: Generate sample data
        run: python scripts/demo_seed.py

      - name: Export leads artifact
        run: python scripts/export_leads.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: line-bot-sample-outputs
          path: artifacts/
